<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Portofolio Game</title>
    <link rel="stylesheet" href="./css/syle.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="game-wrapper">
      <div class="game-container">
        <div class="mobile-game-control press-start-2p-regular">
          <div class="movement-container">
            <div class="up key">
              <img
                id="up"
                class="key-img"
                src="./asset/mobile-keys/up.png"
                alt="up"
              />
            </div>
            <div class="line">
              <div class="right key">
                <img
                  id="right"
                  class="key-img"
                  src="./asset/mobile-keys/right.png"
                  alt="right"
                />
              </div>
              <div class="mid key">
                <img
                  id="mid"
                  class="key-img"
                  src="./asset/mobile-keys/mid.png"
                  alt="mid"
                />
              </div>
              <div class="left key">
                <img
                  id="left"
                  class="key-img"
                  src="./asset/mobile-keys/left.png"
                  alt="left"
                />
              </div>
            </div>
            <div class="down key">
              <img
                id="down"
                class="key-img"
                src="./asset/mobile-keys/down.png"
                alt="down"
              />
            </div>
          </div>
          <div class="action-container">
            <div class="jump b-x k-button">
              <img
                id="b-x"
                class="k-button-img"
                src="./asset/mobile-keys/b-x.png"
                alt=""
              />
            </div>
            <div class="attack b-t k-button">
              <img
                id="b-t"
                class="k-button-img"
                src="./asset/mobile-keys/b-t.png"
                alt=""
              />
            </div>
            <div class="confirm b-o k-button">
              <img
                id="b-o"
                class="k-button-img"
                src="./asset/mobile-keys/b-o.png"
                alt=""
              />
            </div>
          </div>
        </div>
        <div class="text-container">
          <div class="char-wrapper">
            <img src="./asset/charFace/m1.png" alt="player" class="char-img" />
            <h4 class="player-name press-start-2p-regular">AGUNG</h4>
          </div>
          <div class="text-wrapper">
            <p class="text-box pixel-font">
              Lorem ipsum dolor sit amet, consectetur adipisicing elit. Nam,
              similique. Tempora, excepturi odit. Mollitia repudiandae
              temporibus nisi, ipsa ex ullam quo consequatur ratione fuga optio
              aliquam, dolore iusto eaque dolores.
            </p>
          </div>
        </div>
        <canvas id="game"></canvas>
      </div>
    </div>

    <div class="isi-content"></div>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
